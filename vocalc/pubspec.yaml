name: vocalc
description: "Voice-first cross-platform calculator. Speak naturally, get answers."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Speech-to-text (on-device where the platform supports it).
  speech_to_text: ^7.0.0
  # Text-to-speech for reading results back aloud.
  flutter_tts: ^4.2.0
  # Deterministic math expression evaluator (the actual arithmetic engine).
  math_expressions: ^2.6.0
  # Raw HTTPS calls to the Claude Messages API (no official Dart SDK exists).
  http: ^1.2.2
  # Lightweight local persistence for calculation history.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
